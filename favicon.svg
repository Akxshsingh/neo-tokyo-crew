<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2a7f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffcc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0b0c0e"/>
  
  <!-- Border -->
  <rect width="60" height="60" x="2" y="2" rx="10" fill="none" stroke="url(#favGrad)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Main Character -->
  <text x="8" y="44" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="34" font-weight="900" fill="url(#favGrad)" filter="url(#glow)">鉄</text>
  
  <!-- Accent Dot -->
  <circle cx="52" cy="16" r="4" fill="#ffcc00" filter="url(#glow)"/>
  
  <!-- Bottom Line -->
  <line x1="8" y1="52" x2="56" y2="52" stroke="#ff2a7f" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.6"/>
</svg>